{% if current_user.has_permission('notification.rule.update') %}
<button type="button" class="btn btn-success" data-bs-toggle="modal" data-bs-target="#updateTriggerTypeModal"><i class="bi bi-pencil"></i> {{ _('Edit') }}</button>
<div class="modal fade" id="updateTriggerTypeModal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-labelledby="updateTriggerTypeModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h1 class="modal-title fs-5" id="updateTriggerTypeModalLabel"><i class="bi bi-pencil"></i> {{ _('Edit trigger type') }}: {{ trigger_type.code }}</h1>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">{% include 'notification/trigger_type/form.trigger_type.update.html' %}</div>
        </div>
    </div>
</div>
{% endif %}
