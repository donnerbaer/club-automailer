<div class="modal fade" id="removeMemberGroup{{ group.id }}Modal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-labelledby="removeMemberGroup{{ group.id }}ModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h1 class="modal-title fs-5" id="removeMemberGroup{{ group.id }}ModalLabel">
                    <i class="bi bi-collection-dash"></i> {{ _('Remove group from member') }}: {{ group.name }}
                </h1>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="alert alert-danger mb-0" role="alert">
                    {{ _('Are you sure you want to remove this group from the member?') }}
                </div>
            </div>
            <div class="modal-footer">
                <a class="btn btn-danger" href="{{ url_for('notification.remove_group_from_member', member_id=member.id, group_id=group.id) }}">
                    <i class="bi bi-trash"></i> {{ _('Remove') }}
                </a>
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">{{ _('Close') }}</button>
            </div>
        </div>
    </div>
</div>
