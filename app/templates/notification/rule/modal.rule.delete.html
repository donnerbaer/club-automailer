{% if current_user.has_permission('notification.rule.delete') %}
<button type="button" class="btn btn-danger" data-bs-toggle="modal" data-bs-target="#deleteRuleModal"><i class="bi bi-trash"></i> {{ _('Delete') }}</button>
<div class="modal fade" id="deleteRuleModal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-labelledby="deleteRuleModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h1 class="modal-title fs-5" id="deleteRuleModalLabel"><i class="bi bi-trash"></i> {{ _('Delete rule') }}: {{ rule.name }}</h1>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body"><div class="alert alert-danger mb-0" role="alert">{{ _('Are you sure you want to delete this rule?') }}</div></div>
            <div class="modal-footer">
                <a class="btn btn-danger" href="{{ url_for('notification.rule_delete', rule_id=rule.id) }}">{{ _('Delete') }}</a>
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">{{ _('Close') }}</button>
            </div>
        </div>
    </div>
</div>
{% endif %}
