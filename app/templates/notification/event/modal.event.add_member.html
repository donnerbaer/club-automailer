{% if current_user.has_permission('notification.event.update') %}
<button type="button" class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#addEventMemberModal">
    <i class="bi bi-person-plus-fill"></i> {{ _('Add member') }}
</button>

<div class="modal fade" id="addEventMemberModal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-labelledby="addEventMemberModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h1 class="modal-title fs-5" id="addEventMemberModalLabel">
                    <i class="bi bi-person-plus-fill"></i> {{ _('Add member to event') }}: {{ event.rendered_title or event.title }}
                </h1>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                {% include 'notification/event/form.event.add_member.html' %}
            </div>
        </div>
    </div>
</div>
{% endif %}
