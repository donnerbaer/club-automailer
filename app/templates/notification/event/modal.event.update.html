{% if current_user.has_permission('notification.event.update') %}
<button type="button" class="btn btn-success" data-bs-toggle="modal" data-bs-target="#updateEventModal">
    <i class="bi bi-pencil"></i> {{ _('Edit event') }}
</button>

<div class="modal fade" id="updateEventModal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-labelledby="updateEventModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h1 class="modal-title fs-5" id="updateEventModalLabel">
                    <i class="bi bi-pencil"></i> {{ _('Edit event') }}: {{ event.rendered_title or event.title }}
                </h1>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                {% include 'notification/event/form.event.update.html' %}
            </div>
        </div>
    </div>
</div>
{% endif %}
