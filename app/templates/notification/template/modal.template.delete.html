{% if current_user.has_permission('notification.template.delete') %}
<button type="button" class="btn btn-danger" data-bs-toggle="modal" data-bs-target="#deleteTemplateModal">
    <i class="bi bi-trash"></i> {{ _('Delete template') }}
</button>

<div class="modal fade" id="deleteTemplateModal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-labelledby="deleteTemplateModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h1 class="modal-title fs-5" id="deleteTemplateModalLabel">
                    <i class="bi bi-trash"></i> {{ _('Delete template') }}: {{ template.code }}
                </h1>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="alert alert-danger mb-0" role="alert">
                    {{ _('Are you sure you want to delete this template? This action cannot be undone.') }}
                </div>
            </div>
            <div class="modal-footer">
                <a class="btn btn-danger" href="{{ url_for('notification.template_delete', template_id=template.id) }}">
                    <i class="bi bi-trash"></i> {{ _('Delete') }}
                </a>
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">{{ _('Close') }}</button>
            </div>
        </div>
    </div>
</div>
{% endif %}
