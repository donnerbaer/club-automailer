<button type="button" class="btn btn-secondary btn-sm" data-bs-toggle="modal" data-bs-target="#removeMember{{ member.id }}Modal">
    {{ _('Remove') }}
</button>

<div class="modal fade" id="removeMember{{ member.id }}Modal" tabindex="-1" aria-labelledby="removeMember{{ member.id }}ModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h1 class="modal-title fs-5" id="removeMember{{ member.id }}ModalLabel">
                    {{ _('Remove member from group') }}: {{ member.first_name }} {{ member.last_name }}
                </h1>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="alert alert-danger" role="alert">
                    {{ _('Are you sure you want to remove this member from the group? This action cannot be undone.') }}
                </div>
            </div>
            <div class="modal-footer">
                <a class="btn btn-danger" href="{{ url_for('notification.remove_member_from_group', group_id=group.id, member_id=member.id) }}">
                    <i class="bi bi-person-dash"></i> {{ _('Remove') }}
                </a>
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">{{ _('Close') }}</button>
            </div>
        </div>
    </div>
</div>
